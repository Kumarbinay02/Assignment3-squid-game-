<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Squid Game UI</title>

  <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"
    rel="stylesheet"
  />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="main">

    <nav>

      <img src="squid_game_logo_grunge_nobg.png" class="logo">

      <div class="nav-links">
        <a href="#">About</a>
        <a href="#" class="active">Watch now</a>
        <a href="#">Actors</a>
        <a href="#">Contact</a>
      </div>

      <i class="ri-menu-3-line menu"></i>

    </nav>

    <div class="hero">

      <div class="left">

        <img src="squid_game_logo_neon_nobg.png" class="title-logo">

        <p>
          Action / Thriller / Drama Series directed by Dong-hyuk Hwang
          <br>
          Season 1: 9 Episodes
        </p>

        <div class="buttons">

          <button class="play-btn">
            <i class="ri-play-circle-fill"></i>
            Play Now
          </button>

          <button class="trailer-btn">
            <i class="ri-play-line"></i>
            Watch Trailer
          </button>

        </div>

      </div>

      <div class="scroll">
        <span>SCROLL</span>
        <div class="line"></div>
      </div>
        
      <div class="right">

        <img src="./main-removebg-preview.png" class="guard-img">

        <div class="social">

          <i class="ri-twitter-x-line"></i>
          <i class="ri-instagram-line"></i>
          <i class="ri-facebook-fill"></i>

        </div>

      </div>

    </div>

    <h1 class="fade-text">GAME</h1>
    <h1 class="fade-side">SQUID</h1>

    <div class="cards">

      <div class="card">
        <img src="Guards.jpg">
        <div class="play">
          <i class="ri-play-fill"></i>
        </div>
      </div>

      <div class="card">
        <img src="Guard3.jpg">
        <div class="play">
          <i class="ri-play-fill"></i>
        </div>
      </div>

      <div class="card">
        <img src="3Guards.jpg">
        <div class="play">
          <i class="ri-play-fill"></i>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
